<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход · Городская игра</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1 style="font-size:18px; line-height:1.4;">Игра в городское продюсерование</h1>
    <p style="font-size:12px; color:#888; margin-top:4px; margin-bottom:4px;">по авторской методологии Святослава Мурунова</p>
    <p>Введите пароль для входа</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="field-group">
        <label class="field-label">Пароль</label>
        <input type="password" name="password" autofocus
               placeholder="Введите пароль" style="margin-bottom: 14px;">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
        Войти
      </button>
    </form>
  </div>
</div>
</body>
</html>
